services:
  # --- BACKEND: Node.js ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node_backend
    # Lệnh này đảm bảo Prisma Client luôn được generate đúng môi trường Linux khi start
    command: sh -c "npx prisma generate && npm run dev"
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DB_HOST=host.docker.internal
      - DB_PORT=${DB_PORT:-5433}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@host.docker.internal:${DB_PORT:-5433}/${DB_NAME}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-10}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      # Quan trọng: Giữ node_modules của container không bị máy host đè lên
      - /app/node_modules
      - ./src/uploads:/app/src/uploads
    security_opt:
      - no-new-privileges:true

networks:
  default:
    name: canhan_backend_network